<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.11.3/css/dataTables.bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.2.0/css/fixedHeader.bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.2.9/css/responsive.bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<title>Info BAHP/BAST RSAB Harapan Kita 2026</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-image: url('https://www.image2url.com/r2/default/images/1781078533954-a6923c1c-5d73-4f10-8258-9b4695249c1f.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding-top: 20px;
    position: relative;
    min-height: 100vh;
}

/* Animasi partikel mengambang */
.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}

.particle {
    position: absolute;
    background: linear-gradient(135deg, #00828A, #4dd0e1);
    border-radius: 50%;
    opacity: 0.15;
    animation: float 15s infinite;
}

.particle:nth-child(1) {
    width: 80px;
    height: 80px;
    left: 10%;
    animation-delay: 0s;
    animation-duration: 12s;
}

.particle:nth-child(2) {
    width: 60px;
    height: 60px;
    left: 70%;
    animation-delay: 2s;
    animation-duration: 15s;
}

.particle:nth-child(3) {
    width: 100px;
    height: 100px;
    left: 40%;
    animation-delay: 4s;
    animation-duration: 18s;
}

.particle:nth-child(4) {
    width: 50px;
    height: 50px;
    left: 80%;
    animation-delay: 6s;
    animation-duration: 14s;
}

.particle:nth-child(5) {
    width: 70px;
    height: 70px;
    left: 20%;
    animation-delay: 3s;
    animation-duration: 16s;
}

@keyframes float {
    0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 0.15;
    }
    90% {
        opacity: 0.15;
    }
    100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
    }
}

.container {
    position: relative;
    z-index: 1;
}

/* Logo dengan animasi */
.logo-kiri-atas {
    position: absolute;
    left: 20px;
    top: 20px;
    animation: slideInLeft 1s ease-out;
    z-index: 10;
}

@keyframes slideInLeft {
    from {
        transform: translateX(-100px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.logo-img {
    height: 45px;
    width: auto;
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
    transition: transform 0.3s ease;
}

.logo-img:hover {
    transform: scale(1.1) rotate(5deg);
}

/* Header dengan animasi */
.judul {
    text-align: center;
    margin-bottom: 35px;
    line-height: 1.3;
    animation: fadeInDown 1s ease-out;
}

@keyframes fadeInDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.judul-atas,
.judul-bawah {
    font-size: 24px;
    font-weight: 500;
    color: #2c3e50;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    animation: fadeIn 1.5s ease-out;
}

.judul-tengah {
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(135deg, #00828A, #4dd0e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 8px 0;
    animation: scaleIn 1s ease-out;
    position: relative;
    display: inline-block;
}

.judul-tengah::before,
.judul-tengah::after {
    content: '✦';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: #00828A;
    opacity: 0.6;
    animation: twinkle 2s ease-in-out infinite;
}

.judul-tengah::before {
    left: -35px;
}

.judul-tengah::after {
    right: -35px;
    animation-delay: 1s;
}

@keyframes scaleIn {
    from {
        transform: scale(0.5);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes twinkle {
    0%, 100% {
        opacity: 0.3;
        transform: translateY(-50%) scale(1);
    }
    50% {
        opacity: 0.8;
        transform: translateY(-50%) scale(1.2);
    }
}

/* Info card di atas tabel */
.info-cards {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    animation: slideInUp 1s ease-out;
}

@keyframes slideInUp {
    from {
        transform: translateY(50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.info-card {
    flex: 1;
    background: linear-gradient(135deg, #fff, #f8f9fa);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    border: 2px solid transparent;
}

.info-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,130,138,0.2);
    border-color: #00828A;
}

.info-card i {
    font-size: 32px;
    color: #00828A;
    margin-bottom: 10px;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.1);
    }
}

.info-card h3 {
    font-size: 14px;
    color: #666;
    margin: 5px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.info-card .number {
    font-size: 28px;
    font-weight: 700;
    color: #00828A;
    margin-top: 5px;
}

/* Tabel dengan animasi */
.table-box {
    background: #fff;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    animation: zoomIn 0.8s ease-out;
    border: 3px solid #00828A;
    position: relative;
    overflow: hidden;
}

.table-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #4dd0e1, transparent);
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    0% {
        left: -100%;
    }
    100% {
        left: 100%;
    }
}

@keyframes zoomIn {
    from {
        transform: scale(0.9);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #e0e0e0;
}

.table-title {
    font-size: 22px;
    font-weight: 600;
    color: #2c3e50;
    display: flex;
    align-items: center;
    gap: 10px;
}

.table-title i {
    color: #00828A;
}

.last-update {
    font-size: 13px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 5px;
}

.last-update i {
    color: #00828A;
    animation: rotate 2s linear infinite;
}

@keyframes rotate {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

table.dataTable thead th {
    font-weight: 600;
    background: linear-gradient(135deg, #00828A, #00a0aa) !important;
    color: white !important;
    border: none !important;
    padding: 15px 10px;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 0.5px;
}

table.dataTable tbody tr {
    transition: all 0.3s ease;
}

table.dataTable tbody tr:hover {
    background-color: #e0f7fa !important;
    transform: scale(1.01);
    box-shadow: 0 2px 8px rgba(0,130,138,0.2);
}

table.dataTable tbody td {
    vertical-align: middle;
    padding: 12px 10px;
}

/* Status badge dengan animasi */
table.dataTable tbody td:last-child {
    font-weight: 600;
}

/* Pagination styling */
.dataTables_wrapper .dataTables_paginate .paginate_button {
    border-radius: 8px !important;
    margin: 0 3px;
    transition: all 0.3s ease;
}

.dataTables_wrapper .dataTables_paginate .paginate_button:hover {
    background: #00828A !important;
    color: white !important;
    border-color: #00828A !important;
    transform: translateY(-2px);
}

.dataTables_wrapper .dataTables_paginate .paginate_button.current {
    background: linear-gradient(135deg, #00828A, #4dd0e1) !important;
    color: white !important;
    border-color: #00828A !important;
}

/* Search box styling */
.dataTables_wrapper .dataTables_filter input {
    border: 2px solid #00828A;
    border-radius: 25px;
    padding: 8px 15px;
    transition: all 0.3s ease;
}

.dataTables_wrapper .dataTables_filter input:focus {
    outline: none;
    box-shadow: 0 0 10px rgba(0,130,138,0.3);
    transform: scale(1.05);
}

/* Loading animation */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 1s ease-out 2s forwards;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

.loader {
    width: 60px;
    height: 60px;
    border: 5px solid #e0e0e0;
    border-top: 5px solid #00828A;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Responsive */
@media(max-width:768px) {
    .logo-kiri-atas {
        position: absolute;
        left: 15px;
        top: 15px;
    }

    .logo-img {
        height: 35px;
    }

    .judul {
        margin-top: 80px;
    }

    .judul-atas,
    .judul-bawah {
        font-size: 18px;
    }

    .judul-tengah {
        font-size: 26px;
    }

    .judul-tengah::before,
    .judul-tengah::after {
        display: none;
    }

    .info-cards {
        flex-direction: column;
    }

    .table-header {
        flex-direction: column;
        gap: 10px;
    }

    .table-box {
        padding: 15px;
    }
}

/* Scroll to top button */
.scroll-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #00828A, #4dd0e1);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,130,138,0.4);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 1000;
}

.scroll-top.show {
    opacity: 1;
    visibility: visible;
}

.scroll-top:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,130,138,0.6);
}
</style>

</head>

<body>

<!-- Loading Overlay -->
<div class="loading-overlay">
    <div class="loader"></div>
</div>

<!-- Particles Background -->
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container">

    <!-- Logo -->
    <div class="logo-kiri-atas">
        <img src="https://www.image2url.com/r2/default/images/1781078286848-55ddb0f7-afb6-40f7-b301-1cb9e448e7ca.png" alt="Logo Kemenkes RSAB Harapan Kita" class="logo-img">
    </div>

    <!-- Judul -->
    <div class="judul">
        <div class="judul-atas">Informasi Pengambilan</div>
        <div class="judul-tengah">BAHP/BAST</div>
        <div class="judul-bawah">RSAB Harapan Kita</div>
    </div>

    <!-- Info Cards -->
    <div class="info-cards">
        <div class="info-card">
            <i class="fas fa-file-contract"></i>
            <h3>Total Dokumen</h3>
            <div class="number" id="totalDocs">0</div>
        </div>
        <div class="info-card">
            <i class="fas fa-building"></i>
            <h3>Perusahaan</h3>
            <div class="number" id="totalCompanies">0</div>
        </div>
        <div class="info-card">
            <i class="fas fa-clock"></i>
            <h3>Update Terakhir</h3>
            <div class="number" id="lastUpdate" style="font-size: 16px;">-</div>
        </div>
    </div>

    <!-- Tabel -->
    <div class="table-box">
        <div class="table-header">
            <div class="table-title">
                <i class="fas fa-table"></i>
                Data BAHP/BAST
            </div>
            <div class="last-update">
                <i class="fas fa-sync-alt"></i>
                Auto-refresh 30 detik
            </div>
        </div>

        <table id="example" class="table table-striped table-bordered" style="width:100%">
        </table>
    </div>

</div>

<!-- Scroll to Top Button -->
<div class="scroll-top" id="scrollTop">
    <i class="fas fa-arrow-up"></i>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script src="https://cdn.datatables.net/1.11.3/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.11.3/js/dataTables.bootstrap.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.2.0/js/dataTables.fixedHeader.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.2.9/js/dataTables.responsive.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.2.9/js/responsive.bootstrap.min.js"></script>

<script>
$(document).ready(function () {

    var table = $("#example").DataTable({
        ajax: {
            url: "https://script.google.com/macros/s/AKfycbybW1cYR9kb1hQTsqIFkvRjiJ7MXfZ48rOlI4K2OOiledY6EJokzPZ4BcNuNLyz8AwO/exec",
            dataSrc: function (json) {
                var filteredData = json.data.filter(function (row) {
                    return !isNaN(parseFloat(row.No)) &&
                           isFinite(row.No) &&
                           row.Perusahaan !== "";
                });
                
                // Update info cards
                updateInfoCards(filteredData);
                
                return filteredData;
            }
        },

        columns: [
            { title: "No", data: "No" },
            { title: "NAMA PERUSAHAAN", data: "Perusahaan" },
            { title: "NO. SPPB / SPK", data: "SPPB" },
            { title: "NO. BAHP / BAST", data: "BAHP" },
            { title: "Status BA", data: "Status" }
        ],

        columnDefs: [
            {
                targets: 0,
                type: "num",
                render: function (data, type) {
                    return type === "display" || type === "filter"
                        ? parseInt(data)
                        : data;
                }
            }
        ],

        order: [[0, "asc"]],
        responsive: true,
        pageLength: 10,
        language: {
            search: "Cari:",
            lengthMenu: "Tampilkan _MENU_ data per halaman",
            info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
            infoEmpty: "Menampilkan 0 sampai 0 dari 0 data",
            infoFiltered: "(difilter dari _MAX_ total data)",
            paginate: {
                first: "Pertama",
                last: "Terakhir",
                next: "Selanjutnya",
                previous: "Sebelumnya"
            },
            zeroRecords: "Loading...",
            emptyTable: "Tidak ada data tersedia"
        }
    });

    // Auto reload setiap 30 detik
    setInterval(function(){
        table.ajax.reload(null, false);
    }, 30000);

    // Update info cards
    function updateInfoCards(data) {
        $('#totalDocs').text(data.length);
        
        var uniqueCompanies = [...new Set(data.map(item => item.Perusahaan))];
        $('#totalCompanies').text(uniqueCompanies.length);
        
        var now = new Date();
        var timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                        now.getMinutes().toString().padStart(2, '0');
        $('#lastUpdate').text(timeString);
    }

    // Scroll to top button
    $(window).scroll(function() {
        if ($(this).scrollTop() > 300) {
            $('#scrollTop').addClass('show');
        } else {
            $('#scrollTop').removeClass('show');
        }
    });

    $('#scrollTop').click(function() {
        $('html, body').animate({scrollTop: 0}, 600);
        return false;
    });

});
</script>

</body>
</html>
