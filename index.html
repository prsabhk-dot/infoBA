<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.datatables.net/1.11.3/css/dataTables.bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.datatables.net/fixedheader/3.2.0/css/fixedHeader.bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.datatables.net/responsive/2.2.9/css/responsive.bootstrap.min.css"
    />
    <title>Info BAHP/BAST RSAB Harapan Kita 2026</title>
  </head>
  <body">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
          <h3 class="text-center mb-4">Info BAHP/BAST RSAB Harapan Kita 2026</h3>
          <h4 class="text-center mb-4" id="packageName"></h4>
          <br>
          <br>
          <br>
          <br>
          <table
            id="example"
            class="table table-striped table-bordered mt-2 mb-2"
            style="width: 100%"
          ></table>
          <br />
          <br />
          <p id="passingGrade"></p>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <script src="https://cdn.datatables.net/1.11.3/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.3/js/dataTables.bootstrap.min.js"></script>
    <script src="https://cdn.datatables.net/fixedheader/3.2.0/js/dataTables.fixedHeader.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.2.9/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.2.9/js/responsive.bootstrap.min.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <!-- <script type="text/javascript" src="data.json"></script> -->
<script type="text/javascript">
  $(document).ready(function () {
    $("#example").DataTable({
      ajax: {
        url: "https://script.google.com/macros/s/AKfycbyMrUf8zAAXRoWIEIe5-WiqPHCwBUtqq735uh2riONKnO1apKU4cdI1hDzlFQrLimFz/exec",
        dataSrc: function (json) {
          return json.data.filter(function (row) {
            return !isNaN(parseFloat(row.No)) && isFinite(row.No) && row.Perusahaan !== "";
          });
        }
      },
      columns: [
        { title: "No", data: "No" },
        { title: "NAMA PERUSAHAAN", data: "Perusahaan" },
        { title: "NO. SPPB / SPK", data: "SPPB" },
        { title: "NO. BAHP / BAST", data: "BAHP" },
        { title: "Status BA", data: "Status" },
      ],
      columnDefs: [
        {
          targets: 0,
          type: "num",
          render: function (data, type, row) {
            return type === 'display' || type === 'filter' ? parseInt(data) : data;
          }
        }
      ],
      order: [[0, "asc"]],
      rowId: "Perusahaan",
      responsive: true
    });
  });
</script>
  </body>
</html>
